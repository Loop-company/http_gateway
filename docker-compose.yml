services:
  # HTTP API gateway
  http-gateway:
    build:
      context: ./http_gateway
      dockerfile: Dockerfile
    container_name: http-gateway
    environment:
      AUTH_SERVICE_ADDR: auth-service:50051
      USER_SERVICE_ADDR: user-service:50052
      ANALYTICS_SERVICE_ADDR: analytics-service:50053
    ports:
      - "8000:8080"
    depends_on:
      - auth-service
      - user-service
      - analytics-service
    networks:
      - backend-network
    restart: unless-stopped

  # auth service
  auth-service:
    build:
      context: ../auth_service/auth
      dockerfile: Dockerfile
    container_name: authentication-backend
    env_file:
      - ../auth_service/auth/.env
    environment:
      GRPC_PORT: 50051
      KAFKA_BROKERS: kafka:9092
    ports:
      - "50051:50051"
    depends_on:
      db-auth:
        condition: service_started
      redis-auth:
        condition: service_started
      kafka-topics-init:
        condition: service_completed_successfully
    networks:
      - backend-network

  # auth postgres
  db-auth:
    image: postgres:15
    container_name: jwt-auth-db
    env_file:
      - ../auth_service/auth/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network

  # auth redis
  redis-auth:
    image: redis:7-alpine
    container_name: jwt-auth-redis
    networks:
      - backend-network

  # user service
  user-service:
    build:
      context: ../user_service/user-service
      dockerfile: Dockerfile
    container_name: user-service
    env_file:
      - ../user_service/user-service/.env
    environment:
      GRPC_PORT: 50052
      KAFKA_BROKERS: kafka:9092
    ports:
      - "50052:50052"
    depends_on:
      db-user:
        condition: service_started
      redis-user:
        condition: service_started
      kafka-topics-init:
        condition: service_completed_successfully
    networks:
      - backend-network
    restart: unless-stopped

  # user postgres
  db-user:
    image: postgres:15-alpine
    container_name: db-user
    env_file:
      - ../user_service/user-service/.env
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-userdb}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # user redis
  redis-user:
    image: redis:7-alpine
    container_name: redis-user
    command: redis-server --appendonly yes
    volumes:
      - redis_user_data:/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  analytics-service:
    build:
      context: ../analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    environment:
      GRPC_ADDR: :50053
      POSTGRES_HOST: db-analytics
      POSTGRES_INTERNAL_PORT: 5432
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics_password
      POSTGRES_DB: analytics
      POSTGRES_SSL_MODE: disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPICS: auth.events,user.events
      KAFKA_GROUP_ID: analytics-service
      MIGRATIONS_DIR: migrations
    ports:
      - "50053:50053"
    depends_on:
      db-analytics:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
    networks:
      - backend-network
    restart: unless-stopped

  db-analytics:
    image: postgres:16-alpine
    container_name: db-analytics
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics_password
    volumes:
      - postgres_analytics_data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_DATA_DIR: /var/lib/zookeeper/data
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: ruok,stat,envi
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo stat | nc localhost 2181 | grep Mode"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  kafka-topics-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-topics-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic auth.events --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user.events --partitions 3 --replication-factor 1
    networks:
      - backend-network

volumes:
  postgres_data:
  postgres_user_data:
  postgres_analytics_data:
  redis_user_data:
  zookeeper_data:
  kafka_data:

networks:
  backend-network:
    driver: bridge
